<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="theme-switch-container">
        <button id="theme-toggle" aria-label="Cambiar tema visual">🌙 Modo Noche</button>
    </div>

    <main>
        <section id="login-container">
            <h2>Iniciar Sesión</h2>
            <p>Introduce tus credenciales para acceder al sistema SGG.</p>

            <form id="login-form">
                <div class="form-group">
                    <label Tweaks for="username">Usuario o Correo:</label>
                    <input type="text" id="username" required autocomplete="username" placeholder="admin / user">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
                </div>

                <button type="submit" id="btn-submit">Ingresar</button>
            </form>
            
            <div id="error-message" class="error-text" aria-live="polite"></div>
        </section>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
